server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # SPA fallback: any path that doesn't resolve to a real file
    # is rewritten to index.html so React Router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed asset filenames are content-addressable; cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}